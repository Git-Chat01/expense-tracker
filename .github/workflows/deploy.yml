# ================================================================
# 消费轨迹系统 — GitHub Pages 部署 Workflow
# 直接推 gh-pages 分支，绕过 GitHub Pages 部署 API
# ================================================================

name: Deploy to GitHub Pages

on:
  push:
    branches: [master]

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 需要写权限才能推 gh-pages 分支

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          # CNAME 文件自动带上，自定义域名不会丢
          keep_files: false
